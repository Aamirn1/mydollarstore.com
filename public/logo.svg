<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="droneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a89e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bgGrad)"/>

  <!-- Drone Body -->
  <ellipse cx="32" cy="32" rx="8" ry="5" fill="url(#droneGrad)"/>

  <!-- Arms -->
  <line x1="24" y1="32" x2="12" y2="20" stroke="url(#droneGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="32" x2="52" y2="20" stroke="url(#droneGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="32" x2="12" y2="44" stroke="url(#droneGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="32" x2="52" y2="44" stroke="url(#droneGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Propellers (circles with spin effect) -->
  <!-- Top-left -->
  <ellipse cx="12" cy="20" rx="9" ry="2.5" fill="url(#droneGrad)" opacity="0.7"/>
  <!-- Top-right -->
  <ellipse cx="52" cy="20" rx="9" ry="2.5" fill="url(#droneGrad)" opacity="0.7"/>
  <!-- Bottom-left -->
  <ellipse cx="12" cy="44" rx="9" ry="2.5" fill="url(#droneGrad)" opacity="0.7"/>
  <!-- Bottom-right -->
  <ellipse cx="52" cy="44" rx="9" ry="2.5" fill="url(#droneGrad)" opacity="0.7"/>

  <!-- Motor hubs -->
  <circle cx="12" cy="20" r="2.5" fill="#0a0a0a" stroke="url(#droneGrad)" stroke-width="1.5"/>
  <circle cx="52" cy="20" r="2.5" fill="#0a0a0a" stroke="url(#droneGrad)" stroke-width="1.5"/>
  <circle cx="12" cy="44" r="2.5" fill="#0a0a0a" stroke="url(#droneGrad)" stroke-width="1.5"/>
  <circle cx="52" cy="44" r="2.5" fill="#0a0a0a" stroke="url(#droneGrad)" stroke-width="1.5"/>

  <!-- Camera/Lens on body -->
  <circle cx="32" cy="33" r="2" fill="#0a0a0a" stroke="url(#droneGrad)" stroke-width="1"/>

  <!-- LED lights on body -->
  <circle cx="26" cy="31" r="1" fill="#00ff88" opacity="0.9"/>
  <circle cx="38" cy="31" r="1" fill="#ff3366" opacity="0.9"/>
</svg>
